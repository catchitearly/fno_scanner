name: Fetch F&O Historical Data

on:
  schedule:
    # Run at 3:45 PM IST (10:15 AM UTC) after market close
    - cron: '15 10 * * 1-5'
    # Also run at 9:00 AM IST before market opens
    - cron: '30 3 * * 1-5'
  workflow_dispatch:
    inputs:
      stock_symbol:
        description: 'Stock symbol (e.g., RELIANCE, TCS, HDFCBANK)'
        required: false
        default: 'RELIANCE'

jobs:
  fetch-data:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Create data directory
      run: mkdir -p data
    
    - name: Create config file
      run: |
        cat > config.yaml << EOF
        fyers:
          app_id: "${{ secrets.FYERS_APP_ID }}"
          access_token: "${{ secrets.FYERS_ACCESS_TOKEN }}"
        EOF
    
    - name: Fetch Futures Historical Data
      env:
        STOCK_SYMBOL: ${{ github.event.inputs.stock_symbol || 'RELIANCE' }}
      run: |
        python scripts/fetch_futures_data.py
    
    - name: Fetch Option Chain with Strike Increments
      env:
        STOCK_SYMBOL: ${{ github.event.inputs.stock_symbol || 'RELIANCE' }}
      run: |
        python scripts/fetch_option_chain.py
    
    - name: Upload data artifacts
      uses: actions/upload-artifact@v4
      with:
        name: fo-data-${{ github.run_id }}
        path: data/
        retention-days: 7
    
    - name: List generated files
      run: |
        echo "Generated files:"
        ls -la data/
